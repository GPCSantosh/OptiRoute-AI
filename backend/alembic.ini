[alembic]
script_location = alembic
prepend_sys_path = .

sqlalchemy.url = postgresql://optiroute_db_user:g55ia6nV5KkursHBkKPWTYpi2yTJqB8L@dpg-d95qpqe7r5hc73eost10-a/optiroute_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
