version: "3.9"

services:

  backend:
    build: ./backend

    container_name: optiroute_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./backend/.env

    depends_on:
      - db
      - redis

  db:
    image: postgres:16

    container_name: optiroute_postgres

    restart: always

    environment:

      POSTGRES_DB: optiroute

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: optiroute_redis

    ports:
      - "6379:6379"

volumes:

  postgres_data: